
name: 'pen_dataprodukt'
version: '0.1.0'
profile: 'pen_dataprodukt'
flags:
  send_anonymous_usage_stats: False  # Stopper datasending til dbt Labs
clean-targets: # det som fjernes ved å kjøre dbt clean
  - "target"
  - "dbt_packages"

docs-paths: ["docs"]
test-paths: ["tests"]
seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]
snapshot-paths: ["snapshots"]



vars:
  # Defaulter til den første dagen i måneden til kjøretidspunktet
  # periode er på formatet YYYYMM som integer
  periode: "to_char(trunc(add_months(current_date, -1)), 'YYYYMM')"
  # dato_endret_filter: "01.01.1900"
  dato_endret_filter: "to_date('01.01.2023', 'DD.MM.YYYY')"
  behandlingsstatistikk_start_dato: "to_date('01.01.2026', 'DD.MM.YYYY')"

# modellene er tagget med sak eller stonad for om de skal til dv-team-pensjon eller team sak
models:
  pen_dataprodukt:
    +contract:
      enforced: false
    +materialized: view # alle modeller blir views
    +persist_docs:
      relation: true
      columns: true
    staging:
      +docs:
        node_color: '#a3c785'
    intermediate:
      +docs:
        node_color: '#49a8b3'
      behandlingsstatistikk:
        +tags: ['sak']
      stonadsstatistikk:
        +tags: ['stonad']
    marts:
      +docs:
        node_color: '#a176b3'
      stonadsstatistikk:
        +tags: ['stonad']
      avstemming:
        +tags: ['stonad']
      behandlingsstatistikk:
        +tags: ['sak']

snapshots:
  pen_dataprodukt:
    +persist_docs:
      relation: true
      columns: true
    +docs:
      node_color: '#e6b400'
